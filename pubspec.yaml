name: wealthflow
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_bloc: ^8.1.4
  bloc: ^8.1.4
  equatable: ^2.0.5
  # DI
  get_it: ^7.6.7
  # Navigation
  go_router: ^13.2.0
  # Network
  dio: ^5.4.1
  # Code generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  # UI
  fl_chart: ^0.67.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  # Utils
  intl: ^0.19.0
  fpdart: ^1.1.0
  flutter_svg: ^2.0.10+1
  retrofit: ^4.5.0
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  # freezed: ^2.4.7
  json_serializable: ^6.7.1
  # injectable_generator: ^2.4.1
  flutter_lints: ^3.0.0
  # bloc_test: ^9.1.6
  # mocktail: ^1.0.3
  flutter_launcher_icons: ^0.13.1
  flutter_gen_runner: ^5.6.0
  retrofit_generator: ^9.1.5


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_launcher_icon.png"

  adaptive_icon_background: "#083332" # Teal/Green from the provided logo
  adaptive_icon_foreground: "assets/images/app_launcher_icon.png"

flutter_gen:
  output: lib/core/gen/
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/svgs/
    - assets/svgs/dashboard/

  fonts:
    - family: Sentient
      fonts:
        - asset: assets/fonts/Sentient-Regular.otf
        - asset: assets/fonts/Sentient-Italic.otf
          style: italic
        - asset: assets/fonts/Sentient-Bold.otf
          weight: 700
        - asset: assets/fonts/Sentient-BoldItalic.otf
          weight: 700
          style: italic
        - asset: assets/fonts/Sentient-Medium.otf
          weight: 500
        - asset: assets/fonts/Sentient-MediumItalic.otf
          weight: 500
          style: italic
        - asset: assets/fonts/Sentient-Light.otf
          weight: 300
        - asset: assets/fonts/Sentient-LightItalic.otf
          weight: 300
          style: italic
        - asset: assets/fonts/Sentient-Extralight.otf
          weight: 200
        - asset: assets/fonts/Sentient-ExtralightItalic.otf
          weight: 200
          style: italic


